# Wallet Top-Up: Backend + Bot + Frontend (static) + PostgreSQL + Redis
# Usage: from repo root: docker-compose -f wallet_topup/docker-compose.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/wallet_topup_db
      - REDIS_URL=redis://redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    command: uvicorn wallet_topup.backend.main:app --host 0.0.0.0 --port 8001

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: ./bot/.env
    environment:
      - BACKEND_URL=http://backend:8001
      - REDIS_URL=redis://redis:6379/3
    depends_on:
      - backend
      - redis
    command: python -m wallet_topup.bot.main

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet_topup_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - wallet_topup_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_topup_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wallet_topup_pg_data:
