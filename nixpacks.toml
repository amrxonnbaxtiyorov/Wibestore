# Railway Nixpacks config (used when not deploying with Dockerfile)
# https://nixpacks.com/docs/configuration

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --omit=optional || npm install --omit=optional"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
NODE_ENV = "production"
NODE_VERSION = "20"
